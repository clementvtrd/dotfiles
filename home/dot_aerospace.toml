config-version = 2

after-login-command = []
after-startup-command = []
start-at-login = true
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true
accordion-padding = 16
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
automatically-unhide-macos-hidden-apps = true
persistent-workspaces = ['1', '2', '3', '4', '5']

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 32
inner.vertical = 32
outer.left = 32
outer.top = 16
outer.bottom = 32
outer.right = 32

[mode.main.binding]
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'

alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

alt-shift-1 = 'move-node-to-workspace 1 --focus-follows-window'
alt-shift-2 = 'move-node-to-workspace 2 --focus-follows-window'
alt-shift-3 = 'move-node-to-workspace 3 --focus-follows-window'
alt-shift-4 = 'move-node-to-workspace 4 --focus-follows-window'
alt-shift-5 = 'move-node-to-workspace 5 --focus-follows-window'

ctrl-1 = 'workspace 11'
ctrl-2 = 'workspace 12'
ctrl-3 = 'workspace 13'
ctrl-4 = 'workspace 14'
ctrl-5 = 'workspace 15'

ctrl-shift-1 = 'move-node-to-workspace 11 --focus-follows-window'
ctrl-shift-2 = 'move-node-to-workspace 12 --focus-follows-window'
ctrl-shift-3 = 'move-node-to-workspace 13 --focus-follows-window'
ctrl-shift-4 = 'move-node-to-workspace 14 --focus-follows-window'
ctrl-shift-5 = 'move-node-to-workspace 15 --focus-follows-window'

[workspace-to-monitor-force-assignment]
1 = 'main'
2 = 'main'
3 = 'main'
4 = 'main'
5 = 'main'
11 = ['secondary', 'main']
12 = ['secondary', 'main']
13 = ['secondary', 'main']
14 = ['secondary', 'main']
15 = ['secondary', 'main']

[[on-window-detected]]
if.app-id = 'company.thebrowser.dia'
run = ['move-node-to-workspace 1 --focus-follows-window']

[[on-window-detected]]
if.app-id = 'com.microsoft.VSCode'
run = ['move-node-to-workspace 2 --focus-follows-window']

[[on-window-detected]]
if.app-id = 'com.googlecode.iterm2'
run = ['move-node-to-workspace 3 --focus-follows-window']

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = ['move-node-to-workspace 4 --focus-follows-window']

[[on-window-detected]]
if.app-id = 'com.anthropic.claudefordesktop'
run = ['move-node-to-workspace 5 --focus-follows-window']

schemaVersion: "2"
kind: sandbox
name: oh-my-claude
displayName: Oh My Claude!
description: Oh My Claude! is a CLI tool that enhances your experience with the Claude AI assistant.

agentContext: |
  ## Git and GitHub CLI usage

  Avoid `git` and `gh` commands that write or mutate state (commit, push, add, reset,
  checkout, branch, merge, rebase, stash, tag, remote changes, PR/issue creation, edits,
  comments, merges, closes, releases, etc.) unless the user directly asks for that specific
  action. Read-only commands (status, diff, log, show, view) are always fine without asking.

  This overrides any other guidance in this file suggesting git/gh writes are pre-authorized
  by default.

environment:
  variables:
    NAMEOMC_NOTIFY: 0
    LANG: en_US.UTF-8
    LC_ALL: en_US.UTF-8

sandbox:
    image: "docker/sandbox-templates:claude-code-docker"
    aiFilename: CLAUDE.md
    entrypoint:
        run: [omc, --madmax]

network:
    allowedDomains:
        - pecl.php.net:443

commands:
    install:
        - description: Install Github Spec-Kit
          user: 1000
          command: uv tool install specify-cli --from git+https://github.com/github/spec-kit.git@v0.12.8

        - description: Install rtk
          user: 1000
          command: |
            curl -fsSL https://raw.githubusercontent.com/rtk-ai/rtk/refs/heads/master/install.sh | sh
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> ~/.bashrc

    startup:
        - description: Install rtk
          user: 1000
          command: [rtk, init, --agent, claude, --auto-patch]

        - description: Upgrade specify
          user: 1000
          command: [specify, self, upgrade]

        - description: Integrate specify with Claude
          user: 1000
          command: [specify, init, ., --integration, claude, --script, sh]

schemaVersion: "2"
kind: mixin
name: my-claude
displayName: My Claude Agent

commands:
    install:
        - description: Install rtk
          user: "1000"
          command: |
            curl -fsSL https://raw.githubusercontent.com/rtk-ai/rtk/refs/heads/master/install.sh | sh
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> /etc/sandbox-persistent.sh
            export PATH="$HOME/.local/bin:$PATH"
            rtk telemetry disable
            rtk init --global --auto-patch

        - description: Install Specify
          user: "1000"
          command: uv tool install specify-cli --from git+https://github.com/github/spec-kit.git

        - description: Install Matt Pocock skills
          user: "1000"
          command: |
            claude plugin marketplace add mattpocock/skills
            claude plugin install mattpocock-skills@mattpocock

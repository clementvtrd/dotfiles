# AI agents: before editing this file, read the following references:
# https://docs.docker.com/ai/sandboxes/customize/kit-reference.md

schemaVersion: "2"
kind: mixin
name: my-kit
displayName: My Kit

agentContext: |
  ## User Profile

  **Role**: Full-stack developer

  **Stack**: Symfony (PHP) · TypeScript + React + React Native (web + mobile)

  **Collaboration**:
  - Propose alternatives before implementing; user wants to co-architect solutions.
  - Push back on bad architectural choices unsolicited.
  - Do not initiate grilling sessions — only the user initiates those.
  - Avoid over-engineering: no design patterns unless the user argues the case first.

  **Language**: User may write in French. If so: translate to English, confirm the translation with the user, then process only if confirmed.

  ## Tooling

  Prefer direct file operations (Read, Edit, Write) over writing and executing scripts. Use Bash for simple shell tasks. Only write a script if the logic genuinely requires it.

  **Git and GitHub CLI usage:** read-only commands always fine. No writes unless explicitly asked.

environment:
  proxyManaged:
    - GH_TOKEN

credentials:
  sources:
    github:
      env:
        - GH_TOKEN

commands:
    install:
        - description: Install rtk
          user: 1000
          command: |
            curl -fsSL https://raw.githubusercontent.com/rtk-ai/rtk/refs/heads/master/install.sh | sh
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> ~/.bashrc
            export PATH="$HOME/.local/bin:$PATH"
            rtk telemetry disable
            rtk init --global --auto-patch

        - description: Install Caveman
          user: 1000
          command: curl -fsSL https://raw.githubusercontent.com/JuliusBrussee/caveman/main/install.sh | bash

        - description: Install mattpocock/skills
          user: 1000
          command: npx -y skills@latest add mattpocock/skills --yes --all --global --agent '*'

        - description: Install Github Spec Kit
          user: 1000
          command: uv tool run --from git+https://github.com/github/spec-kit.git specify init --integration claude --force --script sh $HOME

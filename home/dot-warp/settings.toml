[appearance]
spacing = "normal"

[appearance.themes]
system_theme = true
selected_system_themes = {
  dark = {
    custom = { name = "Catppuccin Frappe", path = "/Users/clementvtrd/.warp/themes/catppuccin_frappe.yml" },
  },
  light = {
    custom = { name = "Catppuccin Latte", path = "/Users/clementvtrd/.warp/themes/catppuccin_latte.yml" },
  },
}

[appearance.vertical_tabs]
enabled = true

[appearance.text]
notebook_font_size = 14.0
font_size = 13.0

[appearance.input]
input_mode = "waterfall"

[appearance.window]
override_opacity = 100
override_blur = 1

[code]

[code.editor]
show_code_review_button = true
show_project_explorer = true
show_global_search = true
open_file_editor = "env_editor"
open_code_panels_file_editor = "env_editor"
auto_open_code_review_pane_on_first_agent_change = true

[warp_drive]
enabled = true

[agents]

[agents.third_party]
should_render_cli_agent_toolbar = true
auto_open_composer_on_cli_agent_start = true
auto_dismiss_composer_after_submit = true

[agents.warp_agent]
is_any_ai_enabled = false

[agents.warp_agent.other]
show_agent_notifications = true

[notifications]
toast_duration_secs = 8

[notifications.preferences]
is_agent_task_completed_enabled = true
is_long_running_enabled = true
is_needs_attention_enabled = true
is_password_prompt_enabled = true
long_running_threshold = 30
mode = "dismissed"
play_notification_sound = true

[terminal]

[terminal.input]
honor_ps1 = false
input_box_type_setting = "universal"

[warpify]

[warpify.ssh]
ssh_extension_install_mode = "never_install"

window:
  padding:
    x: 4
    y: 4

  decorations: Full
  opacity: 0.9
  dynamic_title: true
  decorations_theme_variant: light

scrolling:
  history: 10000
  multiplier: 3

font:
  normal:
    family: "MesloLGS NF"
  size: 14

colors:
  primary:
    background: '0xf8f8f8'
    foreground: '0x2a2b33'

  normal:
    black:   '0x000000'
    red:     '0xde3d35'
    green:   '0x3e953a'
    yellow:  '0xd2b67b'
    blue:    '0x2f5af3'
    magenta: '0xa00095'
    cyan:    '0x3e953a'
    white:   '0xbbbbbb'

  bright:
    black:   '0x000000'
    red:     '0xde3d35'
    green:   '0x3e953a'
    yellow:  '0xd2b67b'
    blue:    '0x2f5af3'
    magenta: '0xa00095'
    cyan:    '0x3e953a'
    white:   '0xffffff'

shell:
 program: /bin/zsh
 args:
   - --login
